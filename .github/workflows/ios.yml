name: iOS TestFlight

# Ücretsiz iOS derlemesi (public repo -> macOS runner ücretsiz).
# İmzalama: Xcode OTOMATİK imzalama + App Store Connect API anahtarı
# (-allowProvisioningUpdates). Xcode, app + widget + App Group profillerini
# kendisi oluşturup indirir; manuel profil isim eşleştirmesi yok.

on:
  workflow_dispatch:

env:
  TEAM_ID: 7K8SDL5G3Q
  API_BASE: https://life-radar.liferadar-kaya.workers.dev
  ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
  ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
  # codemagic-cli-tools (sadece yükleme) için
  APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
  APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.ASC_KEY_ID }}
  APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          channel: stable
          cache: true

      - name: Araçlar (xcodeproj + codemagic-cli-tools)
        run: |
          gem install xcodeproj || sudo gem install xcodeproj
          pip3 install --break-system-packages codemagic-cli-tools || pip3 install codemagic-cli-tools

      - name: Flutter paketleri
        run: flutter pub get

      - name: Dart analizi (teşhis — durdurmaz)
        run: flutter analyze 2>&1 | tail -40 || true

      - name: GoogleService-Info.plist çöz
        run: echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 -d > ios/Runner/GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}

      - name: CocoaPods
        run: cd ios && pod install

      - name: Widget hedefini ekle (RiskWidget)
        run: ruby ios/add_widget_target.rb

      - name: App Store Connect API anahtarını yerleştir
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_PRIVATE_KEY" > ~/private_keys/AuthKey_${ASC_KEY_ID}.p8
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: Flutter iOS derle (imzasız)
        run: |
          BUILD_NUM=$(date +%s)
          echo "BUILD_NUM=$BUILD_NUM" >> "$GITHUB_ENV"
          flutter build ios --release --no-codesign \
            --build-number=$BUILD_NUM \
            --dart-define=API_BASE=$API_BASE

      - name: Arşivle (otomatik imzalama, ASC anahtarıyla)
        run: |
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=$TEAM_ID \
            archive

      - name: ExportOptions.plist oluştur
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>$TEAM_ID</string>
            <key>signingStyle</key><string>automatic</string>
            <key>uploadSymbols</key><true/>
            <key>destination</key><string>export</string>
          </dict>
          </plist>
          EOF

      - name: IPA dışa aktar
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            -exportPath "$RUNNER_TEMP/ipa" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: TestFlight'a yükle
        run: app-store-connect publish --path "$RUNNER_TEMP/ipa/*.ipa"

      - uses: actions/upload-artifact@v4
        with:
          name: app-release-ipa
          path: ${{ runner.temp }}/ipa/*.ipa
          if-no-files-found: warn
