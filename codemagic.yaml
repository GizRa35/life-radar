# Codemagic CI/CD — Life Radar iOS (TestFlight) yapılandırması
# Codemagic, kodu GitHub'dan alıp bulut Mac'te iOS derler ve TestFlight'a gönderir.
#
# Codemagic arayüzünde yapılması gerekenler:
#  1) Team Settings → Integrations → App Store Connect → API anahtarını "LifeRadar ASC" adıyla ekle.
#  2) Bu workflow'u seç ve "Start new build".

workflows:
  ios-testflight:
    name: iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: LifeRadar ASC      # ← Codemagic UI'da bu isimle eklenecek API anahtarı
    cache:
      cache_paths:
        - $HOME/.pub-cache               # Flutter paketleri
        - $HOME/Library/Caches/CocoaPods # iOS pod arşivi
        - $CM_BUILD_DIR/ios/Pods         # kurulu pod'lar
    environment:
      groups:
        - appstore
        - firebase            # GOOGLE_SERVICE_INFO_PLIST (base64) burada tanımlı
      flutter: 3.24.5
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter paketlerini al
        script: flutter pub get
      - name: GoogleService-Info.plist enjekte et (push için)
        script: |
          # Public repo: plist commit edilmez, Codemagic env'inden çözülür.
          echo "$GOOGLE_SERVICE_INFO_PLIST" | openssl base64 -d -A > ios/Runner/GoogleService-Info.plist
          echo "plist yazildi: $(wc -c < ios/Runner/GoogleService-Info.plist) bayt"
      - name: CocoaPods kurulumu
        script: find . -name "Podfile" -execdir pod install \;
      - name: iOS widget hedefini ekle (RiskWidget — xcodeproj)
        script: |
          # WidgetKit extension hedefini Runner.xcodeproj'a programatik ekle.
          ruby ios/add_widget_target.rb
      - name: İmzalama (kalıcı anahtarla sertifika+profil oluştur ve uygula)
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.liferadar.lifeRadar" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
          # Widget extension için ayrı profil (App Group'lu App ID).
          app-store-connect fetch-signing-files "com.liferadar.lifeRadar.RiskWidget" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: iOS IPA derle (bulut backend'e bağlı)
        script: |
          # Benzersiz, her zaman artan build numarası (Unix zaman damgası) →
          # "build number already used" hatasını kalıcı olarak önler.
          BUILD_NUM=$(date +%s)
          echo "Build number: $BUILD_NUM"
          flutter build ipa --release \
            --build-number=$BUILD_NUM \
            --dart-define=API_BASE=https://life-radar.liferadar-kaya.workers.dev \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Doğrudan "TEST" iç-test grubuna dağıt (dış inceleme yok → kırmızı vermez,
        # build otomatik TestFlight'a düşer).
        beta_groups:
          - TEST

  # ---------------------------------------------------------------------------
  # ANDROID — Google Play için imzalı AAB üretir.
  #
  # Codemagic arayüzünde yapılması gerekenler (TEK SEFER):
  #  1) App settings → Code signing → Android keystore →
  #     "upload-keystore.jks" dosyasını yükle, şifre/alias/key şifresini gir,
  #     Reference name olarak BİREBİR şunu yaz: liferadar_upload
  #  2) Bu workflow'u (Android Google Play) seç → "Start new build".
  #  3) Build bitince build/.../bundle/release/app-release.aab dosyasını indir,
  #     Google Play Console'a yükle.
  # ---------------------------------------------------------------------------
  android-googleplay:
    name: Android Google Play
    instance_type: mac_mini_m2   # plan linux_x2'yi desteklemiyor; Mac Android da derler
    max_build_duration: 60
    environment:
      android_signing:
        - liferadar_upload   # ← Codemagic UI'da bu isimle keystore yüklenecek
      groups:
        - firebase           # GOOGLE_SERVICES_JSON (base64) burada tanımlı
      flutter: 3.24.5
    cache:
      cache_paths:
        - $HOME/.pub-cache       # Flutter paketleri
        - $HOME/.gradle/caches   # Gradle önbelleği (hızlandırır)
    scripts:
      - name: key.properties oluştur (Codemagic keystore'undan)
        script: |
          # build.gradle imzalamayı key.properties'ten okur; Codemagic'in
          # sağladığı keystore değişkenlerinden bu dosyayı üret.
          cat > "$CM_BUILD_DIR/android/key.properties" <<EOF
          storeFile=$CM_KEYSTORE_PATH
          storePassword=$CM_KEYSTORE_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          keyPassword=$CM_KEY_PASSWORD
          EOF
      - name: Flutter paketlerini al
        script: flutter pub get
      - name: google-services.json enjekte et (push için)
        script: |
          # Public repo: json commit edilmez, Codemagic env'inden çözülür.
          echo "$GOOGLE_SERVICES_JSON" | openssl base64 -d -A > android/app/google-services.json
          echo "json yazildi: $(wc -c < android/app/google-services.json) bayt"
      - name: AAB derle (Google Play, imzalı)
        script: |
          # Benzersiz, artan versionCode (Unix zaman damgası) →
          # "version code already used" hatasını önler.
          BUILD_NUM=$(date +%s)
          echo "Build number: $BUILD_NUM"
          flutter build appbundle --release \
            --build-number=$BUILD_NUM \
            --dart-define=API_BASE=https://life-radar.liferadar-kaya.workers.dev
    artifacts:
      - build/**/outputs/bundle/**/*.aab
      - build/**/outputs/**/mapping.txt
