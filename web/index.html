<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="life_radar">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Life Radar</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Identity Services (Google ile giriş) -->
  <script src="https://accounts.google.com/gsi/client" async></script>
  <script>
    window.lifeRadarGoogleSignIn = function () {
      return new Promise(function (resolve, reject) {
        try {
          var client = google.accounts.oauth2.initTokenClient({
            client_id: '16315127325-3nsg79tajk2ikjuindt59p88o3g5a67i.apps.googleusercontent.com',
            scope: 'openid email profile',
            callback: function (resp) {
              if (resp && resp.access_token) resolve(resp.access_token);
              else reject('no_token');
            },
            error_callback: function (err) { reject(String(err && err.type || err)); }
          });
          client.requestAccessToken();
        } catch (e) {
          reject(String(e));
        }
      });
    };
  </script>

  <script>
    // The value below is injected by flutter build, do not touch.
    const serviceWorkerVersion = null;
  </script>
  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>
</head>
<body>
  <script>
    window.addEventListener('load', function(ev) {
      // Download main.dart.js
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
